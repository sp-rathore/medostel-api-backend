[pytest]
# Pytest Configuration for Medostel API Tests
# Version: 1.0
# Last Updated: March 1, 2026

# Async mode configuration
asyncio_mode = auto

# Test discovery
testpaths = tests
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Output and reporting options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests (isolated component testing)
    integration: Integration tests (multi-component testing)
    functional: Functional tests (API endpoint testing)
    performance: Performance tests (response time, throughput)
    security: Security tests (SQL injection, XSS, etc.)
    smoke: Smoke tests (basic sanity checks)
    slow: Slow tests (marked for separate execution)
    flaky: Flaky tests (unreliable, may fail intermittently)

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */env/*
    */__main__.py
    */setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if 0:
    if False:
    if TYPE_CHECKING:
    @abstractmethod
    class .*\(Protocol\):

precision = 2
skip_covered = False
skip_empty = True

# Test timeout (in seconds)
timeout = 300

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Minimum Python version
minversion = 7.0

# Doctest configuration
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Failed test re-execution (0 = off)
reruns = 0

# Show extra test summary info
console_output_style = progress
